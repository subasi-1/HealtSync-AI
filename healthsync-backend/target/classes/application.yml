spring:
  application:
    name: healthsync-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/healthsync_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  jwt:
    secret: "5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437" # 256-bit hex secret placeholder
    expiration-ms: 3600000 # 1 hour
